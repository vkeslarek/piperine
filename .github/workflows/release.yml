name: Release

on:
  push:
    branches:
      - 'release/v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: piperine
            archive_name: piperine-linux-x86_64.tar.gz
          - os: macos-latest
            artifact_name: piperine
            archive_name: piperine-macos-aarch64.tar.gz
          - os: windows-latest
            artifact_name: piperine.exe
            archive_name: piperine-windows-x86_64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --bin piperine

      - name: Package binary
        shell: bash
        run: |
          cd target/release
          if [[ "${{ matrix.archive_name }}" == *.zip ]]; then
            7z a ../../${{ matrix.archive_name }} ${{ matrix.artifact_name }}
          else
            tar -czvf ../../${{ matrix.archive_name }} ${{ matrix.artifact_name }}
          fi
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  build-ide:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'editors/vscode/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Package Extension
        run: npx vsce package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: piperine-vscode-extension
          path: editors/vscode/*.vsix

  release:
    name: Create GitHub Release
    needs: [build, build-ide]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Version
        id: get_version
        run: |
          # The branch name is like release/v0.0.1
          # This extracts just v0.0.1
          VERSION=${GITHUB_REF#refs/heads/release/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          target_commitish: ${{ github.sha }}
          files: artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
