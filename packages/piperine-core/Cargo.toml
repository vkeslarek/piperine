[package]
name = "piperine-core"
version.workspace = true
edition.workspace = true

[dependencies]
faer = { version = "0.23.2", features = ["sparse", "std", "sparse-linalg", "rayon"] }
num-complex = "0.4.6"
num-traits = "0.2.19"
piperine-macros = { path = "../piperine-macros" }
rand_distr = "0.5.1"
paste = "1.0.15"
uom = { version = "0.37.0", features = ["complex64", "f64", "autoconvert"] }
