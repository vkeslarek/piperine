[workspace]

[workspace.package]
version = "0.1.0"
edition = "2024"

[package]
name = "piperine"
version.workspace = true
edition.workspace = true

[build-dependencies]
bindgen = "0.72.1"

[profile.release]
debug = true
opt-level = 3
lto = "fat"
codegen-units = 1

[profile.dev.package.faer]
opt-level = 3

[dependencies]
faer = { version = "0.23.2", features = ["sparse", "std", "sparse-linalg"] }
num-complex = "0.4.6"
num-traits = "0.2.19"
rand_distr = "0.5.1"
paste = "1.0.15"
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
ndarray = { version = "0.17.1", features = ["rayon"] }
rayon = "1.11.0"
