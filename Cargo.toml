[workspace]
members = [
    "crates/piperine-core",
    "crates/piperine-ngspice",
    "crates/piperine-pool",
]

[workspace.package]
version = "0.1.0"
edition = "2024"

[package]
name = "piperine"
version.workspace = true
edition.workspace = true

[dependencies]
piperine-core = { path = "crates/piperine-core" }
piperine-ngspice = { path = "crates/piperine-ngspice" }
piperine-pool = { path = "crates/piperine-pool" }
serde = { workspace = true }
bincode = { workspace = true }

[build-dependencies]
bindgen = "0.72.1"

[profile.release]
debug = true
opt-level = 3
lto = "fat"
codegen-units = 1

[workspace.dependencies]
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
thiserror = "2.0"
paste = "1.0"
