[workspace]
members = ["packages/piperine-api","packages/piperine-solver"]

[workspace.package]
version = "0.1.0"
edition = "2024"

[package]
name = "piperine"
version.workspace = true
edition.workspace = true

[build-dependencies]
bindgen = "0.72.1"

[profile.release]
debug = true
opt-level = 3
lto = "fat"
codegen-units = 1

[workspace.dependencies]
num-complex = "0.4.6"
num-traits = "0.2.19"
tracing = "0.1.44"
tracing-subscriber = "0.3.22"