site_name: Piperine PHDL
site_description: Piperine PHDL Simulator and Language Specification

# === [ SPECIFICATION VERSION ] ===
# Change this field when the PHDL language version evolves.
# Independent of the Rust simulator codebase version.
extra:
  phdl_version: "0.1.1"
# ===================================
theme:
  name: material

plugins:
  - search
  - macros

nav:
  - Home: index.md
  - Specification (PHDL):
      - Intro: spec/index.md
      - Language: spec/part_i_language.md
      - Elaboration: spec/part_ii_elaboration.md
      - Interpreted Context (Bench): spec/part_iii_interpreted_context.md
      - Reflection & Selector: spec/part_iv_reflection_selector.md
      - Builtins Reference: spec/part_v_builtins.md
      - Plugins: spec/part_vi_plugins.md
      - Solver: spec/part_vii_solver.md
      - Worked Examples: spec/appendix_a_worked_examples.md
      - Complete Grammar (EBNF): spec/appendix_b_grammar.md
  - Library & Manual:
      - Usage: manual/index.md
