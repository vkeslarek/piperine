          - Bench Specification Intro: spec/language/07_bench_intro.md
          - Position and principles: spec/language/08_position_and_principles.md
          - The bench block: spec/language/09_the_bench_block.md
          - Module context and name resolution: spec/language/10_module_context_and_name_resolution.md
          - Measurement is through the result object: spec/language/11_measurement_is_through_the_result_object.md
          - Analyses: spec/language/12_analyses_configuration_is_an_argument_not_state.md
          - Result and waveform types: spec/language/13_result_and_waveform_types.md
          - Adjustment through reflection: spec/language/14_adjustment_through_reflection.md
          - The uniform API: spec/language/15_the_uniform_api_hostneutral.md
